<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17345b">
<title>豐源機車行｜維修保養紀錄</title>
<style>
:root{
  --navy:#17345b; --blue:#2368a2; --light:#eef5fb; --white:#fff;
  --ink:#1f2937; --muted:#6b7280; --ok:#16803a; --danger:#b42318;
  --shadow:0 10px 26px rgba(23,52,91,.14);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#eaf3fb,#f7fafc);color:var(--ink)}
header{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:20px 16px 24px;text-align:center}
header h1{margin:0;font-size:28px;letter-spacing:2px}
header p{margin:7px 0 0;font-size:15px;opacity:.92}
.wrap{max-width:760px;margin:-10px auto 40px;padding:0 12px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.tab{border:0;border-radius:16px;padding:16px 8px;font-size:19px;font-weight:800;background:#dce9f5;color:var(--navy)}
.tab.active{background:#fff;box-shadow:var(--shadow)}
.card{background:#fff;border-radius:20px;padding:18px;margin:12px 0;box-shadow:var(--shadow)}
h2{font-size:22px;margin:0 0 14px;color:var(--navy)}
label{display:block;font-size:16px;font-weight:800;margin:12px 0 6px}
input,textarea,select{width:100%;font-size:20px;padding:14px;border:2px solid #cbd5e1;border-radius:13px;background:#fff}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;border:0;border-radius:15px;padding:16px 12px;font-size:19px;font-weight:900;cursor:pointer}
.primary{background:var(--navy);color:#fff}
.secondary{background:#e4eef7;color:var(--navy)}
.success{background:var(--ok);color:#fff}
.danger{background:#fee4e2;color:var(--danger)}
.photo{display:block;text-align:center;background:#fff4cc;border:2px dashed #d49b00;border-radius:16px;padding:20px;font-size:22px;font-weight:900;color:#725000}
.photo input{display:none}
.items{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.item{border:2px solid #c7d7e7;background:#f7fbff;border-radius:14px;padding:15px 8px;text-align:center;font-size:18px;font-weight:800}
.item.on{background:#d7f0df;border-color:#16803a;color:#0e5d29}
.note{font-size:14px;color:var(--muted);line-height:1.6}
.result{border-left:5px solid var(--blue);padding:12px 14px;background:#f4f8fc;border-radius:10px;margin:10px 0}
.record{border:1px solid #d6e0ea;border-radius:14px;padding:14px;margin:10px 0}
.record strong{font-size:18px;color:var(--navy)}
.hidden{display:none!important}
.badge{display:inline-block;background:#e1ecf7;color:var(--navy);border-radius:999px;padding:5px 10px;margin:3px;font-weight:700}
footer{text-align:center;color:#64748b;padding:15px;font-size:13px}
@media(max-width:420px){.items{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}header h1{font-size:25px}}
</style>
</head>
<body>
<header>
  <h1>豐源機車行</h1>
  <p>快速登記｜維修履歷｜保養查詢</p>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="showPage('admin',this)">店內快速登記</button>
    <button class="tab" onclick="showPage('customer',this)">顧客查詢</button>
  </div>

  <section id="adminPage">
    <div class="card">
      <h2>① 拍車牌或輸入車牌</h2>
      <label class="photo">📷 拍攝車牌
        <input id="platePhoto" type="file" accept="image/*" capture="environment">
      </label>
      <p id="ocrStatus" class="note">拍照後可嘗試自動辨識。第一次使用辨識功能時需要網路。</p>
      <label>車牌號碼</label>
      <input id="plate" placeholder="例如 ABC-1234" autocomplete="off">
      <div class="grid2">
        <div><label>手機號碼</label><input id="phone" inputmode="tel" placeholder="09xxxxxxxx"></div>
        <div><label>目前里程</label><input id="mileage" inputmode="numeric" placeholder="例如 25680"></div>
      </div>
    </div>

    <div class="card">
      <h2>② 點選更換項目</h2>
      <div id="items" class="items"></div>
      <label>其他項目</label>
      <input id="otherItem" placeholder="例如 傳動清潔、燈泡">
    </div>

    <div class="card">
      <h2>③ 金額與備註</h2>
      <div class="grid2">
        <div><label>總金額</label><input id="amount" inputmode="numeric" placeholder="例如 350"></div>
        <div><label>下次保養里程</label><input id="nextMileage" inputmode="numeric" placeholder="例如 26680"></div>
      </div>
      <label>備註</label>
      <textarea id="memo" rows="3" placeholder="例如：使用 10W-40 機油"></textarea>
      <button class="btn success" style="margin-top:14px" onclick="saveRecord()">✅ 儲存這筆紀錄</button>
      <button class="btn secondary" style="margin-top:10px" onclick="clearForm()">清空重新輸入</button>
    </div>

    <div class="card">
      <h2>最近登記紀錄</h2>
      <div id="recentRecords"></div>
      <div class="grid2" style="margin-top:12px">
        <button class="btn secondary" onclick="exportData()">下載備份</button>
        <label class="btn secondary" style="text-align:center">匯入備份
          <input id="importFile" type="file" accept=".json" style="display:none">
        </label>
      </div>
    </div>
  </section>

  <section id="customerPage" class="hidden">
    <div class="card">
      <h2>查詢我的維修保養紀錄</h2>
      <label>車牌號碼</label>
      <input id="qPlate" placeholder="例如 ABC-1234">
      <label>手機號碼</label>
      <input id="qPhone" inputmode="tel" placeholder="請輸入登記的手機號碼">
      <button class="btn primary" style="margin-top:16px" onclick="searchCustomer()">🔍 查詢維修紀錄</button>
      <p class="note">為保護資料，車牌與手機號碼必須同時符合。</p>
    </div>
    <div id="customerResults" class="card hidden"></div>
  </section>
</div>

<footer>豐源機車行｜本測試版資料儲存在目前裝置的瀏覽器內</footer>

<script>
const serviceItems=["機油","齒輪油","空氣濾清器","輪胎","煞車皮","電瓶","火星塞","皮帶"];
let selected=new Set();
const itemBox=document.getElementById("items");
serviceItems.forEach(name=>{
  const b=document.createElement("button");
  b.type="button"; b.className="item"; b.textContent=name;
  b.onclick=()=>{b.classList.toggle("on"); selected.has(name)?selected.delete(name):selected.add(name)};
  itemBox.appendChild(b);
});
function normPlate(v){return (v||"").toUpperCase().replace(/\s/g,"").replace(/_/g,"-")}
function normPhone(v){return (v||"").replace(/\D/g,"")}
function getRecords(){try{return JSON.parse(localStorage.getItem("fy_records")||"[]")}catch(e){return[]}}
function setRecords(v){localStorage.setItem("fy_records",JSON.stringify(v))}
function showPage(page,btn){
 document.getElementById("adminPage").classList.toggle("hidden",page!=="admin");
 document.getElementById("customerPage").classList.toggle("hidden",page!=="customer");
 document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active")); btn.classList.add("active");
}
function saveRecord(){
 const plate=normPlate(document.getElementById("plate").value);
 const phone=normPhone(document.getElementById("phone").value);
 let allItems=[...selected];
 const other=document.getElementById("otherItem").value.trim(); if(other) allItems.push(other);
 if(!plate){alert("請先輸入或拍攝車牌");return}
 if(!phone){alert("請輸入顧客手機號碼");return}
 if(!allItems.length){alert("請至少選擇一個維修項目");return}
 const r={
  id:Date.now(), date:new Date().toLocaleString("zh-TW"),
  plate,phone,mileage:document.getElementById("mileage").value.trim(),
  items:allItems,amount:document.getElementById("amount").value.trim(),
  nextMileage:document.getElementById("nextMileage").value.trim(),
  memo:document.getElementById("memo").value.trim()
 };
 const arr=getRecords(); arr.unshift(r); setRecords(arr); renderRecent(); clearForm();
 alert("已儲存："+plate);
}
function clearForm(){
 ["plate","phone","mileage","otherItem","amount","nextMileage","memo"].forEach(id=>document.getElementById(id).value="");
 selected.clear(); document.querySelectorAll(".item").forEach(x=>x.classList.remove("on"));
}
function renderRecent(){
 const box=document.getElementById("recentRecords"), arr=getRecords().slice(0,8);
 if(!arr.length){box.innerHTML='<p class="note">目前還沒有紀錄。</p>';return}
 box.innerHTML=arr.map(r=>`<div class="record"><strong>${r.plate}</strong>　${r.date}<br>
 ${r.items.map(x=>`<span class="badge">${x}</span>`).join("")}<br>
 <span class="note">里程：${r.mileage||"-"}｜金額：${r.amount?("$"+r.amount):"-"}｜下次：${r.nextMileage||"-"}</span>
 <button class="btn danger" style="margin-top:8px;padding:9px;font-size:15px" onclick="deleteRecord(${r.id})">刪除此筆</button></div>`).join("");
}
function deleteRecord(id){
 if(!confirm("確定刪除此筆紀錄？"))return;
 setRecords(getRecords().filter(x=>x.id!==id)); renderRecent();
}
function searchCustomer(){
 const p=normPlate(document.getElementById("qPlate").value), ph=normPhone(document.getElementById("qPhone").value);
 const arr=getRecords().filter(r=>r.plate===p && r.phone===ph);
 const box=document.getElementById("customerResults"); box.classList.remove("hidden");
 if(!arr.length){box.innerHTML="<h2>查詢結果</h2><p>找不到符合的紀錄，請確認車牌與手機號碼。</p>";return}
 box.innerHTML=`<h2>${p} 維修履歷</h2>`+arr.map(r=>`<div class="result"><strong>${r.date}</strong><br>
 ${r.items.map(x=>`<span class="badge">${x}</span>`).join("")}<br>
 里程：${r.mileage||"-"}<br>金額：${r.amount?("$"+r.amount):"-"}<br>
 下次保養里程：${r.nextMileage||"-"}${r.memo?("<br>備註："+r.memo):""}</div>`).join("");
}
function exportData(){
 const blob=new Blob([JSON.stringify(getRecords(),null,2)],{type:"application/json"});
 const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="豐源機車行_維修紀錄備份.json"; a.click();
 URL.revokeObjectURL(a.href);
}
document.getElementById("importFile").addEventListener("change",async e=>{
 const f=e.target.files[0]; if(!f)return;
 try{const data=JSON.parse(await f.text()); if(!Array.isArray(data))throw 0; setRecords(data);renderRecent();alert("備份匯入完成")}
 catch(err){alert("檔案格式不正確")}
});
document.getElementById("platePhoto").addEventListener("change",async e=>{
 const file=e.target.files[0]; if(!file)return;
 const status=document.getElementById("ocrStatus");
 status.textContent="正在辨識車牌，請稍候…";
 try{
  if(!window.Tesseract){
   await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s)});
  }
  const out=await Tesseract.recognize(file,"eng",{logger:m=>{if(m.status==="recognizing text")status.textContent=`辨識中 ${Math.round((m.progress||0)*100)}%`}});
  const raw=(out.data.text||"").toUpperCase();
  const match=raw.match(/[A-Z0-9]{2,4}\s*[- ]?\s*[A-Z0-9]{2,4}/);
  if(match){document.getElementById("plate").value=normPlate(match[0]);status.textContent="已辨識，請確認車牌是否正確。"}
  else status.textContent="沒有清楚辨識到車牌，請直接輸入或重新拍攝。";
 }catch(err){status.textContent="辨識功能目前無法連線，請直接輸入車牌。";}
});
renderRecent();
</script>
</body>
</html>
