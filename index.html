<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>豐源機車行｜維修保養系統 2.1</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",sans-serif;background:#eef3f8;color:#142033}
button,input,textarea{font-family:inherit}.hidden{display:none!important}
.home{min-height:100vh;background:#000;color:#fff;text-align:center;padding:20px 18px 110px}
.brand{color:#ffd400;font-weight:900;font-size:19px}.home h1{font-size:40px;margin:62px 0}
.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:760px;margin:auto}
.tile{border:0;border-radius:24px;padding:24px 10px;min-height:190px;font-size:21px;font-weight:900;background:linear-gradient(#dce8ff,#aac6ff)}
.tile:nth-child(2){background:linear-gradient(#ffe8cc,#ffc98e)}.tile:nth-child(3){background:linear-gradient(#eee,#bbb)}
.icon{display:block;font-size:65px;margin-bottom:15px}.count{font-size:23px;font-weight:900;margin-top:42px}
.foot{position:fixed;bottom:0;left:0;right:0;background:#000;padding:15px;color:#fff}
.page{max-width:760px;margin:auto;padding:0 12px 40px}.head{margin:0 -12px 16px;background:#566bc0;color:#fff;padding:14px;display:flex;justify-content:space-between;align-items:center}
.head button{background:none;border:0;color:#fff;font-size:28px}.head h2{margin:0;font-size:22px}
.card{background:#fff;border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 8px 24px #18345d20}
h3{margin:0 0 12px;color:#17365f;font-size:22px}label{display:block;font-weight:900;margin:12px 0 6px}
input,textarea{width:100%;border:2px solid #ccd6e3;border-radius:14px;padding:14px;font-size:21px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.items{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item{border:2px solid #ccd7e5;border-radius:14px;background:#f7fbff;padding:16px 8px;font-size:18px;font-weight:900}
.item.on{background:#d7f0df;border-color:#16803a}.btn{width:100%;border:0;border-radius:15px;padding:16px;font-size:19px;font-weight:900}
.ok{background:#16803a;color:#fff}.main{background:#1d2c67;color:#fff}.light{background:#e6eef8;color:#17365f}.warn{background:#f4b400;color:#111}
.badge{display:inline-block;background:#e5eef8;padding:5px 10px;border-radius:999px;margin:3px;font-weight:800}
.record{border:1px solid #d6deea;border-radius:14px;padding:14px;margin:10px 0}.plate{font-size:32px;font-weight:900;text-align:center;color:#08609d}
.cam{position:fixed;inset:0;background:#000;z-index:99;color:#fff;display:flex;flex-direction:column}
.camtop{background:#566bc0;padding:14px;display:flex;justify-content:space-between}.camtop button{background:none;border:0;color:#fff;font-size:28px}
.camview{position:relative;flex:1;overflow:hidden}.camview video{width:100%;height:100%;object-fit:cover}
.frame{position:absolute;left:8%;right:8%;top:34%;height:26%;border:4px solid #ffd400;border-radius:18px;box-shadow:0 0 0 9999px #0006}
.tip{position:absolute;left:0;right:0;bottom:16%;text-align:center;font-size:20px;font-weight:900}
.shot{margin:18px auto;width:86px;height:86px;border-radius:50%;border:8px solid #fff;background:#ddd}
.preview{width:100%;border-radius:14px}
.fallback{padding:0 18px 18px}.small{font-size:14px;line-height:1.6;color:#cfd7ff;text-align:center}
@media(max-width:520px){.menu{grid-template-columns:1fr 1fr}.tile:nth-child(3){grid-column:1/-1}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<section id="home" class="home">
  <div class="brand">BuBu 維修達人</div><h1>豐源機車行</h1>
  <div class="menu">
    <button class="tile" onclick="show('entry')"><span class="icon">⌨️</span>車牌輸入</button>
    <button class="tile" onclick="openCamera()"><span class="icon">📷</span>車牌辨識</button>
    <button class="tile" onclick="show('history')"><span class="icon">🔎</span>查詢歷史</button>
  </div>
  <div class="count">車籍 <span id="count">0</span> 已儲存</div>
  <div class="foot">豐源機車行｜version 2.1 手機相容版</div>
</section>

<section id="entry" class="page hidden">
  <div class="head"><button onclick="show('home')">‹</button><h2>快速登記</h2><button onclick="show('home')">⌂</button></div>
  <div class="card"><h3>① 車牌與車主資料</h3>
    <label>車牌號碼</label><input id="plate" placeholder="例如 N3B-703">
    <div class="grid"><div><label>手機號碼</label><input id="phone" inputmode="tel"></div><div><label>目前里程</label><input id="mileage" inputmode="numeric"></div></div>
  </div>
  <div class="card"><h3>② 點選更換項目</h3><div id="items" class="items"></div><label>其他項目</label><input id="other"></div>
  <div class="card"><h3>③ 金額與備註</h3>
    <div class="grid"><div><label>總金額</label><input id="amount" inputmode="numeric"></div><div><label>下次保養里程</label><input id="next" inputmode="numeric"></div></div>
    <label>備註</label><textarea id="memo" rows="3"></textarea>
    <button class="btn ok" style="margin-top:14px" onclick="save()">✅ 儲存這筆紀錄</button>
  </div>
</section>

<section id="history" class="page hidden">
  <div class="head"><button onclick="show('home')">‹</button><h2>車籍及維修紀錄查詢</h2><button onclick="show('home')">⌂</button></div>
  <div class="card"><label>車牌號碼</label><input id="qplate"><label>手機號碼</label><input id="qphone" inputmode="tel">
    <button class="btn main" style="margin-top:14px" onclick="search()">🔎 查詢</button>
  </div>
  <div id="results" class="card hidden"></div>
</section>

<section id="camera" class="cam hidden">
  <div class="camtop"><button onclick="closeCam()">‹</button><strong>車牌辨識</strong><button onclick="closeCam()">⌂</button></div>
  <div class="camview"><video id="video" autoplay playsinline muted></video><div class="frame"></div><div class="tip">請將車牌對準黃色框內</div></div>
  <button class="shot" onclick="capture()"></button>
  <div class="fallback">
    <button class="btn warn" onclick="document.getElementById('photoInput').click()">手機無法開相機？改用拍照上傳</button>
    <div class="small">LINE 內建瀏覽器若阻擋相機，可按上方按鈕，或改用 Chrome 開啟。</div>
  </div>
</section>

<section id="ocr" class="page hidden">
  <div class="head"><button onclick="openCamera()">‹</button><h2>辨識結果</h2><button onclick="show('home')">⌂</button></div>
  <div class="card"><img id="preview" class="preview"><p id="status">準備辨識…</p>
    <label>辨識出的車牌</label><input id="ocrplate" class="plate">
    <button class="btn ok" style="margin-top:14px" onclick="usePlate()">使用這個車牌</button>
    <button class="btn light" style="margin-top:10px" onclick="openCamera()">重新拍攝</button>
  </div>
</section>

<input id="photoInput" class="hidden" type="file" accept="image/*" capture="environment">
<canvas id="canvas" class="hidden"></canvas>

<script>
const names=["機油","齒輪油","空氣濾清器","輪胎","煞車皮","電瓶","火星塞","皮帶"];
let sel=new Set(),stream=null;

names.forEach(n=>{
  let b=document.createElement("button");
  b.className="item";
  b.textContent=n;
  b.onclick=()=>{b.classList.toggle("on");sel.has(n)?sel.delete(n):sel.add(n)};
  document.getElementById("items").appendChild(b)
});

function show(id){
  closeStream();
  ["home","entry","history","camera","ocr"].forEach(x=>document.getElementById(x).classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  updateCount();
  scrollTo(0,0)
}
function norm(v){
  let s=(v||"").toUpperCase().replace(/[^A-Z0-9]/g,"");
  return s.length>=6?s.slice(0,3)+"-"+s.slice(3):s
}
function records(){try{return JSON.parse(localStorage.getItem("fy_v2")||"[]")}catch(e){return[]}}
function setRecords(x){localStorage.setItem("fy_v2",JSON.stringify(x));updateCount()}
function updateCount(){document.getElementById("count").textContent=new Set(records().map(x=>x.plate)).size}

function save(){
  let p=norm(plate.value),ph=phone.value.replace(/\D/g,""),it=[...sel];
  if(other.value.trim())it.push(other.value.trim());
  if(!p||!ph||!it.length)return alert("請填車牌、手機並選擇項目");
  let a=records();
  a.unshift({id:Date.now(),date:new Date().toLocaleString("zh-TW"),plate:p,phone:ph,mileage:mileage.value,items:it,amount:amount.value,next:next.value,memo:memo.value});
  setRecords(a);
  alert("已儲存："+p);
  show("home")
}
function search(){
  let p=norm(qplate.value),ph=qphone.value.replace(/\D/g,""),a=records().filter(x=>x.plate===p&&x.phone===ph);
  results.classList.remove("hidden");
  results.innerHTML=a.length?`<div class="plate">${p}</div>`+a.map(r=>`<div class="record"><strong>${r.date}</strong><br>${r.items.map(x=>`<span class="badge">${x}</span>`).join("")}<br>里程：${r.mileage||"-"}<br>金額：${r.amount||"-"}<br>下次保養：${r.next||"-"}${r.memo?"<br>備註："+r.memo:""}</div>`).join(""):"找不到符合紀錄"
}

async function openCamera(){
  show("camera");
  if(!window.isSecureContext){
    alert("相機需要 HTTPS 安全網址。請確認網址開頭是 https://");
    show("home"); return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    alert("目前瀏覽器不支援直接開啟相機，請改用「拍照上傳」。");
    document.getElementById("photoInput").click();
    return;
  }
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:"environment"},
        width:{ideal:1920},
        height:{ideal:1080}
      },
      audio:false
    });
    video.srcObject=stream;
    await video.play();
  }catch(e){
    console.error("camera error:",e);
    let msg="無法開啟相機。";
    if(e.name==="NotAllowedError"||e.name==="SecurityError") msg+="相機權限被拒絕，請到瀏覽器網站設定允許相機。";
    else if(e.name==="NotFoundError") msg+="找不到可用相機。";
    else if(e.name==="NotReadableError") msg+="相機可能被其他程式占用。";
    else msg+="此瀏覽器可能限制網頁相機。";
    alert(msg+"\n\n接下來請使用「拍照上傳」功能，或用 Chrome 開啟網站。");
    document.getElementById("photoInput").click();
  }
}

function closeStream(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}
function closeCam(){show("home")}

function prep(c){
  let x=c.getContext("2d"),im=x.getImageData(0,0,c.width,c.height),d=im.data;
  for(let i=0;i<d.length;i+=4){
    let g=.299*d[i]+.587*d[i+1]+.114*d[i+2];
    g=g<145?0:255;
    d[i]=d[i+1]=d[i+2]=g
  }
  x.putImageData(im,0,0)
}
function best(t){
  let m=(t||"").toUpperCase().match(/[A-Z0-9]{2,4}\s*[-. ]?\s*[A-Z0-9]{3,4}/);
  return m?norm(m[0]):norm(t)
}
async function runOCR(){
  preview.src=canvas.toDataURL("image/jpeg",.92);
  show("ocr");
  status.textContent="正在辨識…";
  try{
    if(!window.Tesseract)await new Promise((r,j)=>{
      let s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
      s.onload=r;s.onerror=j;document.head.appendChild(s)
    });
    let out=await Tesseract.recognize(canvas,"eng",{logger:m=>{
      if(m.status==="recognizing text")status.textContent=`辨識中 ${Math.round((m.progress||0)*100)}%`
    }});
    ocrplate.value=best(out.data.text);
    status.textContent="已完成，請確認車牌是否正確。"
  }catch(e){
    console.error(e);
    status.textContent="辨識失敗，請手動輸入。"
  }
}
async function capture(){
  let vw=video.videoWidth,vh=video.videoHeight;
  if(!vw){alert("相機尚未準備好，請稍候再拍。");return}
  canvas.width=1500;canvas.height=460;
  canvas.getContext("2d").drawImage(video,vw*.08,vh*.34,vw*.84,vh*.26,0,0,1500,460);
  prep(canvas);closeStream();await runOCR()
}
document.getElementById("photoInput").addEventListener("change",async e=>{
  const file=e.target.files && e.target.files[0];
  if(!file)return;
  const img=new Image();
  img.onload=async()=>{
    const maxW=1600;
    const scale=Math.min(1,maxW/img.width);
    canvas.width=Math.round(img.width*scale);
    canvas.height=Math.round(img.height*scale);
    canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
    prep(canvas);
    URL.revokeObjectURL(img.src);
    e.target.value="";
    await runOCR()
  };
  img.src=URL.createObjectURL(file)
});
function usePlate(){
  if(!ocrplate.value)return alert("請輸入車牌");
  plate.value=norm(ocrplate.value);
  show("entry")
}
updateCount()
</script>
</body>
</html>
